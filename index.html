<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>防災備蓄チェックリスト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>防災備蓄チェックリスト</h1>
    <p>3日間の備蓄目安を人数から自動計算します</p>
  </header>

  <div class="tab-section">
    <button class="tab-btn active" data-days="3">3日</button>
    <button class="tab-btn" data-days="7">7日</button>
  </div>

  <div class="input-section">
    <label for="persons">世帯人数</label>
    <input type="number" id="persons" value="1" min="1" max="20" />
    <span>人</span>
  </div>

  <div class="condition-section">
    <span class="condition-label">世帯の状況</span>
    <label>
      <input type="checkbox" class="cond-checkbox" data-cond="child" />
      子どもがいる
    </label>
    <label>
      <input type="checkbox" class="cond-checkbox" data-cond="female" />
      女性がいる
    </label>
    <label>
      <input type="checkbox" class="cond-checkbox" data-cond="elderly" />
      高齢者がいる
    </label>
  </div>

  <main>
    <div id="stock-list"></div>

    <div class="shopping-list-section">
      <div class="shopping-btns">
        <button id="gen-shopping-list" class="gen-btn">買い物リストを表示</button>
        <button id="print-btn" class="print-btn">印刷する</button>
      </div>
      <div id="shopping-list"></div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
